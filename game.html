<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soul Land Online v0.6.3</title>

<link rel="stylesheet" href="asset/css/game.css">
</head>
<body>

<canvas id="duniaGame"></canvas>

<div class="kontrolKiri">

    <button
    class="tombolGame"
    id="tombolKiri">
    ←
    </button>

    <button
    class="tombolGame"
    id="tombolKanan">
    →
    </button>

</div>

<div class="kontrolKanan">

    <button
    class="tombolGame"
    id="tombolPukul">
    ⚔
    </button>

    <button
    class="tombolGame"
    id="tombolLompat">
    ↑
    </button>

</div>

<div
id="menuMati"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:9998;
justify-content:center;
align-items:center;
flex-direction:column;
">

<h1
style="
color:white;
margin-bottom:20px;
font-size:42px;
">
KAMU MATI
</h1>

<button
id="tombolRespawn"
style="
width:220px;
height:70px;
font-size:28px;
border:none;
border-radius:16px;
">
Respawn
</button>

</div>

<div
class="overlayRotasi"
id="overlayRotasi">

    <div class="hpAnimasi"></div>

    <div class="judulRotasi">
        Putar Perangkat
    </div>

    <div class="teksRotasi">
        Untuk pengalaman bermain yang lebih nyaman,
        gunakan mode horizontal.
    </div>

</div>

<script src="asset/js/game.js"></script>
</body>
</html>
