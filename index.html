<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Land Online v0.1</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#87ceeb;
    font-family:Arial,sans-serif;
}

#duniaGame{
    width:100%;
    height:100%;
    display:block;
}

.kontrolGerak{
    position:fixed;
    left:15px;
    bottom:15px;
    display:flex;
    gap:10px;
    z-index:10;
}

.tombolGerak{
    width:70px;
    height:70px;
    border:none;
    border-radius:16px;
    font-size:32px;
    background:rgba(255,255,255,0.9);
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.tombolGerak:active{
    transform:scale(0.95);
}

.overlayRotasi{
    position:fixed;
    inset:0;
    background:#111;
    color:white;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
    text-align:center;
    padding:20px;
}

.hpAnimasi{
    width:90px;
    height:150px;
    border:5px solid white;
    border-radius:18px;
    margin-bottom:25px;
    position:relative;
    animation:putarHp 1.8s infinite ease-in-out;
}

.hpAnimasi::after{
    content:"";
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    width:30px;
    height:4px;
    background:white;
    border-radius:5px;
}

@keyframes putarHp{
    0%{
        transform:rotate(0deg);
    }
    50%{
        transform:rotate(90deg);
    }
    100%{
        transform:rotate(90deg);
    }
}

.judulRotasi{
    font-size:26px;
    font-weight:bold;
    margin-bottom:10px;
}

.teksRotasi{
    max-width:320px;
    opacity:0.9;
}
</style>
</head>
<body>

<canvas id="duniaGame"></canvas>

<div class="kontrolGerak">
    <button class="tombolGerak" id="kiri">←</button>
    <button class="tombolGerak" id="kanan">→</button>
</div>

<div class="overlayRotasi" id="overlayRotasi">
    <div class="hpAnimasi"></div>

    <div class="judulRotasi">
        Putar Perangkat
    </div>

    <div class="teksRotasi">
        Untuk pengalaman bermain yang lebih nyaman,
        silakan putar HP ke mode horizontal.
    </div>
</div>

<script>
const kanvas = document.getElementById("duniaGame");
const konteks = kanvas.getContext("2d");

function ubahUkuran() {
    kanvas.width = window.innerWidth;
    kanvas.height = window.innerHeight;
}
ubahUkuran();

window.addEventListener("resize", ubahUkuran);

const pemain = {
    x: 150,
    y: 0,
    lebar: 40,
    tinggi: 40,
    warna: "#2ecc71",
    kecepatan: 5
};

let arahKiri = false;
let arahKanan = false;

const tinggiRumput = 100;

function gambarLangit() {
    konteks.fillStyle = "#87ceeb";
    konteks.fillRect(0,0,kanvas.width,kanvas.height);
}

function gambarRumput() {
    const yRumput = kanvas.height - tinggiRumput;

    konteks.fillStyle = "#2ecc71";
    konteks.fillRect(0,yRumput,kanvas.width,tinggiRumput);

    konteks.fillStyle = "#27ae60";

    for(let x=0;x<kanvas.width;x+=20){
        konteks.beginPath();
        konteks.moveTo(x,yRumput);
        konteks.lineTo(x+5,yRumput-10);
        konteks.lineTo(x+10,yRumput);
        konteks.fill();
    }
}

function gambarPemain() {
    konteks.fillStyle = pemain.warna;
    konteks.fillRect(
        pemain.x,
        pemain.y,
        pemain.lebar,
        pemain.tinggi
    );
}

function perbarui() {

    pemain.y =
        kanvas.height -
        tinggiRumput -
        pemain.tinggi;

    if(arahKiri){
        pemain.x -= pemain.kecepatan;
    }

    if(arahKanan){
        pemain.x += pemain.kecepatan;
    }

    if(pemain.x < 0){
        pemain.x = 0;
    }

    if(pemain.x > kanvas.width - pemain.lebar){
        pemain.x = kanvas.width - pemain.lebar;
    }
}

function render() {
    gambarLangit();
    gambarRumput();
    gambarPemain();
}

function loopGame() {
    perbarui();
    render();
    requestAnimationFrame(loopGame);
}

loopGame();

const tombolKiri = document.getElementById("kiri");
const tombolKanan = document.getElementById("kanan");

tombolKiri.addEventListener("touchstart", () => arahKiri = true);
tombolKiri.addEventListener("touchend", () => arahKiri = false);

tombolKanan.addEventListener("touchstart", () => arahKanan = true);
tombolKanan.addEventListener("touchend", () => arahKanan = false);

tombolKiri.addEventListener("mousedown", () => arahKiri = true);
tombolKanan.addEventListener("mousedown", () => arahKanan = true);

document.addEventListener("mouseup", () => {
    arahKiri = false;
    arahKanan = false;
});

const overlayRotasi =
document.getElementById("overlayRotasi");

function cekOrientasi() {

    if(window.innerHeight > window.innerWidth){
        overlayRotasi.style.display = "flex";
    } else {
        overlayRotasi.style.display = "none";
    }
}

cekOrientasi();

window.addEventListener(
    "resize",
    cekOrientasi
);
</script>

</body>
</html>
